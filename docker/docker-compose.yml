services:
    app:
        image: shortlinks:latest-production
        build:
            context: ..
            dockerfile: docker/Dockerfile
        container_name: shortlinks_app
        restart: unless-stopped
        environment:
            - APP_ENV=production
        volumes:
            - ../.env:/var/www/html/.env
            - app_public:/var/www/html/public
            - ../storage:/var/www/html/storage
            - ../bootstrap/cache:/var/www/html/bootstrap/cache
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - shortlinks_network

    init_public:
        image: shortlinks:latest-production
        container_name: shortlinks_init
        entrypoint: [ "sh", "-c" ]
        command:
            - |
                echo '[init] Copying public directory to volume...' &&
                cp -r /var/www/html/public/. /tmp/public/ &&
                echo '[init] Setting permissions...' &&
                chown -R 33:33 /tmp/public &&
                chmod -R 755 /tmp/public &&
                echo '[init] Public directory copied successfully'
        volumes:
            - app_public:/tmp/public
        networks:
            - shortlinks_network

    nginx:
        image: nginx:alpine
        container_name: shortlinks_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - app_public:/var/www/html/public:ro
            - ../storage:/var/www/html/storage
            - ../bootstrap/cache:/var/www/html/bootstrap/cache
        depends_on:
            init_public:
                condition: service_completed_successfully
        networks:
            - shortlinks_network

volumes:
    app_public:
        driver: local

networks:
    shortlinks_network:
        driver: bridge
