services:
    app:
        build:
            context: ..
            dockerfile: docker/Dockerfile
        container_name: shortlinks_app_dev
        restart: unless-stopped
        environment:
          - APP_ENV=local
          - APP_DEBUG=true
        volumes:
          - ..:/var/www/html
          - /var/www/html/vendor
          - /var/www/html/node_modules
          - ../storage:/var/www/html/storage
          - ../bootstrap/cache:/var/www/html/bootstrap/cache
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - shortlinks_network

    nginx:
        image: nginx:alpine
        container_name: shortlinks_nginx
        restart: unless-stopped
        ports:
            - "443:443"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ../public/:/var/www/html/public:ro
            - ../storage:/var/www/html/storage
            - ../bootstrap/cache:/var/www/html/bootstrap/cache
            - /root/cert/lnkshrt.xyz:/root/cert/lnkshrt.xyz:ro
        depends_on:
            - app
        networks:
            - shortlinks_network

volumes:
    app_public:
        driver: local
networks:
    shortlinks_network:
        driver: bridge
