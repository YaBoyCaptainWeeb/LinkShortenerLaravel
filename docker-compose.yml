services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: shortlinks_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./storage:/var/www/html/storage
            - ./bootstrap/cache:/var/www/html/bootstrap/cache
        environment:
            - APP_ENV=production
            - APP_DEBUG=false
        networks:
            - shortlinks_network

    nginx:
        image: nginx:alpine
        container_name: shortlinks_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./storage:/var/www/html/storage
        depends_on:
            - app
        networks:
            - shortlinks_network

networks:  # ← networks на одном уровне с services!
    shortlinks_network:
        driver: bridge
